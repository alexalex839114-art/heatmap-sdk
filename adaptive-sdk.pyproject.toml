[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[project]
name = "adaptive-analytics-sdk"
version = "1.1.0"
description = "Real-time order-flow analytics SDK with VPIN toxicity filtering, asymmetric exhaustion detection, and Gaussian Thompson Sampling over a Multi-Armed Bandit."
requires-python = ">=3.11"
dependencies = ["numpy>=1.24"]

[project.optional-dependencies]
dev = ["pytest>=7.0"]

[tool.setuptools.packages.find]
include = ["adaptive_sdk*"]

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
